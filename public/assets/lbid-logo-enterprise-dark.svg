<svg width="960" height="260" viewBox="0 0 960 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LBID logo</title>
  <desc id="desc">LBID global logistics exchange logo with an abstract orbit, bridge, and trust bond mark.</desc>
  <defs>
    <linearGradient id="orbit" x1="40" y1="34" x2="216" y2="222" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6DF7FF"/>
      <stop offset="0.52" stop-color="#356BFF"/>
      <stop offset="1" stop-color="#D8B35A"/>
    </linearGradient>
    <linearGradient id="bridge" x1="58" y1="86" x2="198" y2="170" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="0.52" stop-color="#A9B6C8"/>
      <stop offset="1" stop-color="#D8B35A"/>
    </linearGradient>
    <linearGradient id="word" x1="304" y1="72" x2="756" y2="168" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.62" stop-color="#EEF5FF"/>
      <stop offset="1" stop-color="#B8C3D5"/>
    </linearGradient>
    <filter id="glow" x="-28%" y="-28%" width="156%" height="156%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.08 0 0 0 0 0.56 0 0 0 0 1 0 0 0 0.42 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g transform="translate(24 2)">
    <path d="M56 68C74.2 43.6 100.4 30 128 30C170.2 30 205.8 57.4 218 95" stroke="url(#orbit)" stroke-width="9" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M218 161C205.8 198.6 170.2 226 128 226C100.4 226 74.2 212.4 56 188" stroke="url(#orbit)" stroke-width="9" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M32 128C32 99.8 43.9 74.4 63 56" stroke="url(#orbit)" stroke-width="9" stroke-linecap="round"/>
    <path d="M224 128C224 156.2 212.1 181.6 193 200" stroke="url(#orbit)" stroke-width="9" stroke-linecap="round"/>
    <path d="M128 46C108.2 67.7 98 95.2 98 128C98 160.8 108.2 188.3 128 210" stroke="#758297" stroke-opacity="0.52" stroke-width="4" stroke-linecap="round"/>
    <path d="M128 46C147.8 67.7 158 95.2 158 128C158 160.8 147.8 188.3 128 210" stroke="#758297" stroke-opacity="0.52" stroke-width="4" stroke-linecap="round"/>
    <path d="M54 128H202" stroke="#758297" stroke-opacity="0.42" stroke-width="4" stroke-linecap="round"/>
    <path d="M72 96L113 128L72 160" stroke="url(#bridge)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M184 96L143 128L184 160" stroke="url(#bridge)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M111 128L128 111L145 128L128 145L111 128Z" fill="#0A1220" stroke="#D8B35A" stroke-width="7" stroke-linejoin="round"/>
    <circle cx="72" cy="96" r="7" fill="#6DF7FF"/>
    <circle cx="184" cy="160" r="7" fill="#D8B35A"/>
  </g>
  <text x="306" y="162" fill="url(#word)" font-family="Inter, Sora, Avenir Next, Arial, sans-serif" font-size="128" font-weight="850" letter-spacing="14">LBID</text>
